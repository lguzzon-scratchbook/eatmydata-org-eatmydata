# Static serving for the eatmydata.ai production bundle.
#
# The app is a backend-free SPA (SolidJS history routing). No cross-origin
# isolation (COOP/COEP) is needed: OPFSCoopSyncVFS and the single-threaded
# inference engines run without SharedArrayBuffer, so plain static serving is
# enough.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Big artefacts (demo .sqlite up to ~350 MB, .wasm, .gguf) — stream them.
    sendfile on;
    tcp_nopush on;
    client_max_body_size 0;

    # Rely on nginx's bundled mime.types (included at the http level): it maps
    # .js -> application/javascript, .css -> text/css, .wasm -> application/wasm,
    # .svg, etc. Do NOT add a server-level `types {}` block — that REPLACES the
    # inherited map and would strip .js/.css typing, breaking ES-module loading.
    # .gguf / .sqlite aren't in mime.types and fall through to this default,
    # which is what we want.
    default_type application/octet-stream;

    # Content-addressed assets (cache/<hash>-… and the <hash>/ asset folders for
    # demo DBs + ONNX) are immutable — their URL changes when their bytes do.
    location /cache/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Runtime config (app-config.json + optional app-config.local.json). NEVER
    # cached (no-store) so a mounted-over or hand-edited file takes effect on the
    # very next reload — no stale copy in any browser/CDN cache. A missing
    # optional overlay returns 404, which the app treats as "no overlay" (it
    # falls back to the embedded catalog / no deployer keys).
    location /config/ {
        # Single explicit header — do NOT also use `expires`, which would emit a
        # second, weaker `Cache-Control: no-cache` + a future `Expires`.
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Everything else: serve the file if it exists, else fall back to index.html
    # so client-side routes (/data-sources, /settings, /tests, /pii, …) work on
    # reload. index.html itself must never be cached (it points at the current
    # hashed assets).
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location / {
        try_files $uri $uri/ /index.html;
    }
}
