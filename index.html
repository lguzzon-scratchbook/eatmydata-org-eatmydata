<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>eatmydata</title>
        <script type="module">
            // Whole <script> will be replaced by dynamic chunk
            if (!location.hostname.endsWith('eatmydata.ai')) {
                try {
                    const rep = await fetch('/config/app-config.json', { redirect: 'follow' });
                    if (rep.ok) {
                        try {
                            window.__APP_CONFIG__ = JSON.parse(await rep.text());
                        } catch (e) {
                            console.warn(
                                '[app-config] invalid /config/app-config.json; using bundled config',
                                e,
                            );
                        }
                    }
                } catch (e) {
                    console.warn(
                        '[app-config] could not fetch /config/app-config.json; using bundled config',
                        e,
                    );
                }
            }
            await import('/src/index.tsx').catch((e) => console.error('Error loading app', e));
        </script>
    </head>
    <body>
        <div id="root"></div>
    </body>
</html>
